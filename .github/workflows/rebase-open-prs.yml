name: Rebase open PRs on main update

# main が更新された直後、既存 feat branch の workflow 定義が default と不一致になり
# Claude PR Review が 401 Workflow validation failed になる問題 (#242 前提、#351) を
# 自動化で解消する。自分 (u-stem) 所有の open PR を順次 main と同期する。
#
# トリガ:
# - push to main: 自動実行
# - workflow_dispatch: 手動トリガ (dry-run 可)
#
# 権限モデル:
# - REBASE_PAT (fine-grained PAT、scope: Contents R/W + Pull requests R/W) で push する (#352)。
#   GITHUB_TOKEN 由来 push は GitHub の仕様 (workflow-infinite-loop 防止) で他 workflow を
#   発火しないため、PAT 経由に切り替えることで rebase 後の CI / claude-review が自動再走する
# - PAT は u-stem/kairous のみにスコープ限定。90 日期限で更新運用
# - 使用 API: gh pr comment (conflict 通知) は GH_TOKEN に REBASE_PAT を渡す。checkout も
#   persist-credentials 経由で同 PAT を使い、git push 時の認証情報として利用される
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (rebase せず対象 PR 一覧のみ表示)"
        type: boolean
        default: false

# 同 workflow の重複実行を直列化する (main への連続 push で race condition を避ける)
concurrency:
  group: rebase-open-prs
  cancel-in-progress: false

jobs:
  rebase:
    runs-on: ubuntu-latest
    # REBASE_PAT 経由で push / comment するため workflow-level の permissions は不要だが、
    # PAT 失効時にエラー箇所を特定しやすいよう明示的に保持する (現状 checkout で落ちる)
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout with full history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # 複数 feat branch を checkout するため全履歴を取得
          fetch-depth: 0
          # 後続 git push で REBASE_PAT を認証情報として使う。GITHUB_TOKEN ではなく
          # PAT にすることで push が他 workflow (CI / claude-review) を発火する (#352)
          persist-credentials: true
          token: ${{ secrets.REBASE_PAT }}

      - name: Configure git identity
        run: |
          # PAT の owner (u-stem) として commit する。GITHUB_TOKEN 時の
          # github-actions[bot] と区別される
          git config user.name "u-stem"
          git config user.email "83386525+u-stem@users.noreply.github.com"

      - name: Rebase open PRs
        env:
          # gh pr comment も PAT で呼び出す (pull-requests:write)。GITHUB_TOKEN ではなく
          # PAT を使うことで comment author が bot ではなく u-stem になる
          GH_TOKEN: ${{ secrets.REBASE_PAT }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          # 自分 (repo owner) が author の open PR のみ対象。fork からの PR は
          # head repository owner が異なるため select で除外する
          PRS=$(gh pr list --state open \
            --json number,headRefName,author,headRepositoryOwner \
            --jq '.[] | select(.headRepositoryOwner.login == env.REPO_OWNER) | select(.author.login == env.REPO_OWNER) | "\(.number) \(.headRefName)"') \
            || { echo "ERROR: gh pr list 失敗"; exit 1; }

          if [ -z "$PRS" ]; then
            echo "open PR なし"
            exit 0
          fi

          TOTAL=$(echo "$PRS" | wc -l | tr -d ' ')
          echo "対象 open PR: $TOTAL 件"

          # 集計用カウンタ
          SYNCED=0
          SKIPPED=0
          CONFLICTS=0

          while IFS=' ' read -r pr_number branch; do
            [ -z "$pr_number" ] && continue
            echo ""
            echo "--- PR #$pr_number ($branch) ---"

            if [ "$DRY_RUN" = "true" ]; then
              echo "  [dryrun] checkout + merge origin/main + push をスキップ"
              continue
            fi

            # feat branch を fetch してから checkout。--force は前イテレーションの
            # merge --abort 後に残留した working tree (本来残らないが defense in depth) を
            # 確実にクリーンにして checkout 失敗を避ける
            git fetch origin "$branch" --quiet 2>/dev/null || true
            if ! git checkout --force "$branch" >/dev/null 2>&1; then
              echo "  SKIP: checkout 失敗 (branch 不在か local 未 fetch)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # merge 実行前後の HEAD を比較し、実質変更があった場合のみ push/SYNCED
            HEAD_BEFORE=$(git rev-parse HEAD)

            # conflict 発生時は merge --abort して PR に通知コメント
            if ! git merge --no-edit origin/main >/dev/null 2>&1; then
              git merge --abort >/dev/null 2>&1 || true
              echo "  CONFLICT: PR に通知"
              # 複数行 body は heredoc 経由の tempfile + --body-file で渡す
              # (YAML 内に heredoc を直書きすると parser が indent を誤認するため)
              tmpbody=$(mktemp)
              {
                echo "main との自動 rebase で conflict が発生しました。手動で解決してください:"
                echo ""
                echo '```bash'
                echo "git fetch origin main"
                echo "git checkout $branch"
                echo "git merge origin/main"
                echo "# conflict 解決後"
                echo "git push"
                echo '```'
                echo ""
                echo "([rebase-open-prs.yml](https://github.com/${GITHUB_REPOSITORY:-}/actions/workflows/rebase-open-prs.yml))"
              } > "$tmpbody"
              gh pr comment "$pr_number" --body-file "$tmpbody" \
                || echo "  WARN: comment 失敗 (gh pr comment)"
              rm -f "$tmpbody"
              CONFLICTS=$((CONFLICTS + 1))
              continue
            fi

            # HEAD 不変 = already up-to-date。push 不要で SKIPPED 扱い
            if [ "$(git rev-parse HEAD)" = "$HEAD_BEFORE" ]; then
              echo "  SKIP: $branch は既に main と同期済み (変更なし)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # upstream tracking 未設定な状況を想定し branch を明示して push する
            if ! git push origin "$branch" >/dev/null 2>&1; then
              echo "  WARN: push 失敗 (branch protection / upstream)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            echo "  OK: $branch を main と同期"
            SYNCED=$((SYNCED + 1))
          done <<< "$PRS"

          # 最後に main に戻す (subsequent step で意図しない branch 残留を避ける)
          git checkout main >/dev/null 2>&1 || true

          echo ""
          echo "===== 完了 ====="
          echo "  同期成功: $SYNCED"
          echo "  conflict: $CONFLICTS"
          echo "  skip:     $SKIPPED"
