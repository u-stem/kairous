name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-kairous
      - run: bun run lint
      - run: bun run typecheck

  test-small:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-kairous
      - run: bun test:small

  test-medium:
    runs-on: ubuntu-latest
    needs: [test-small]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-kairous
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: "2.76.7"
      - name: Supabase ローカル起動 (Edge Function 含む)
        run: supabase start -x realtime,storage,imgproxy,inbucket,pgadmin-schema-diff,migra,studio,logflare,vector,supavisor
      - name: 環境変数を設定
        run: |
          # supabase status -o env の値はダブルクォートで囲まれているので除去する
          eval $(supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=')
          echo "NEXT_PUBLIC_SUPABASE_URL=${API_URL}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> $GITHUB_ENV
      - run: bun test:medium

  migration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: "2.76.7"
      - name: Supabase ローカル起動
        run: supabase start -x realtime,storage,imgproxy,inbucket,pgadmin-schema-diff,migra,studio,edge-runtime,logflare,vector,supavisor
      - name: マイグレーション検証
        run: supabase db lint

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-kairous
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: "2.76.7"
      - name: Supabase ローカル起動
        # build 時に NEXT_PUBLIC_SUPABASE_ANON_KEY がクライアントバンドルに焼き込まれるため、
        # lighthouse / test-large と同一バージョンの Supabase CLI で起動し JWT を一致させる。
        # edge-runtime は build (静的解析のみ) で不要のため除外
        run: supabase start -x realtime,storage,imgproxy,inbucket,pgadmin-schema-diff,migra,studio,edge-runtime,logflare,vector,supavisor
      - name: 環境変数を設定
        run: |
          eval $(supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=')
          echo "NEXT_PUBLIC_SUPABASE_URL=${API_URL}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> $GITHUB_ENV
      - name: Next.js build cache を復元
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('bun.lock', 'package.json') }}-${{ hashFiles('src/**', 'public/**', 'next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            nextjs-${{ hashFiles('bun.lock', 'package.json') }}-
      - name: Next.js 本番ビルド
        run: bun run build
      - name: ビルド成果物を artifact にアップロード
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: nextjs-build
          path: |
            .next
            !.next/cache
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  test-large:
    runs-on: ubuntu-latest
    needs: [test-medium, lint-and-typecheck, build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-kairous
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: "2.76.7"
      - name: Playwright ブラウザインストール
        run: bunx playwright install --with-deps chromium
      - name: Supabase ローカル起動 (Inbucket 含む)
        run: supabase start -x realtime,storage,imgproxy,pgadmin-schema-diff,migra,studio,logflare,vector,supavisor
      - name: 環境変数を設定
        run: |
          eval $(supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=')
          echo "NEXT_PUBLIC_SUPABASE_URL=${API_URL}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> $GITHUB_ENV
      - name: ビルド成果物を download
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: nextjs-build
          path: .next
      - name: prod サーバを起動 (バックグラウンド)
        # CI_REUSE_SERVER=1 で playwright.config.ts の webServer は bun run start のみ実行する
        env:
          CI_REUSE_SERVER: "1"
        run: |
          bun run start &
          bunx wait-on http://localhost:3000 --timeout 60000
      - name: E2E テスト
        env:
          CI_REUSE_SERVER: "1"
        run: bun test:large
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-kairous
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: "2.76.7"
      - name: Playwright ブラウザインストール
        run: bunx playwright install --with-deps chromium
      - name: Supabase ローカル起動
        # build ジョブと同じ Supabase CLI バージョンで起動。deterministic JWT により
        # build 時に bundle に焼き込まれた NEXT_PUBLIC_SUPABASE_ANON_KEY と一致する
        run: supabase start -x realtime,storage,imgproxy,pgadmin-schema-diff,migra,studio,logflare,vector,supavisor
      - name: 環境変数を設定
        run: |
          # supabase status -o env の値はダブルクォートで囲まれているので除去する
          eval $(supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=')
          echo "NEXT_PUBLIC_SUPABASE_URL=${API_URL}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> $GITHUB_ENV
      - name: ビルド成果物を download
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: nextjs-build
          path: .next
      - name: Next.js サーバ起動 (バックグラウンド)
        run: |
          bun run start &
          bunx wait-on http://localhost:3000 --timeout 60000
      - name: 認証 storageState を生成
        # Playwright の setup プロジェクトで /auth/login を突破し
        # tests/large/.auth/user.json に cookies を書き出す。
        # LHCI_REUSE_SERVER=1 で playwright.config.ts の reuseExistingServer を
        # 強制的に true にし、外部で起動済みの bun run start (:3000) を再利用させる。
        # LHCI_SKIP_TEARDOWN=1 で globalTeardown のユーザー削除を抑止し
        # lhci 実行時にセッションを有効に保つ。
        env:
          LHCI_REUSE_SERVER: "1"
          LHCI_SKIP_TEARDOWN: "1"
        run: bun run lhci:setup
      - name: Lighthouse 計測用の Chrome パスを明示
        # puppeteer postinstall は trustedDependencies 外のためスキップされ、
        # 独自 Chromium はダウンロードされない。ubuntu-latest runner に
        # プリインストール済みの google-chrome-stable を CHROME_PATH で明示指定し、
        # 暗黙のシステム Chrome 依存を顕在化させる。
        run: |
          CHROME_PATH=$(which google-chrome-stable)
          if [ -z "$CHROME_PATH" ]; then
            echo "google-chrome-stable が見つからない" >&2
            exit 1
          fi
          echo "CHROME_PATH=${CHROME_PATH}" >> $GITHUB_ENV
      - name: Lighthouse CI 実行
        env:
          # puppeteer は trustedDependencies 外で Chromium 未ダウンロード。
          # puppeteerScript 内の browser.newPage() 等のため system Chrome を明示。
          PUPPETEER_EXECUTABLE_PATH: ${{ env.CHROME_PATH }}
        run: bun run lhci
      - name: Lighthouse レポートを artifact に保存
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
          # .lighthouseci はドット始まりで隠しディレクトリ扱いになるため明示指定
          include-hidden-files: true
          if-no-files-found: error
