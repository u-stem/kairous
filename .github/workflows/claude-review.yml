name: Claude PR Review

# CI が成功した PR のみをレビュー対象にする。CI 失敗中のコードに
# レビューを走らせても無意味なうえ Opus トークンを浪費するため、
# workflow_run で CI 完走・成功をゲート条件にしている。
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  review:
    runs-on: ubuntu-latest
    # pull_request 起点で回った CI が成功した場合にのみレビューする。
    # - event が push の CI (main への merge 直後) や schedule は対象外
    # - conclusion が failure / cancelled / skipped は対象外
    # - pull_requests が空配列 (fork PR など) も対象外 (secrets も渡せないため)
    #   toJSON 比較で確実に空配列を判定する (配列要素アクセスの null 判定は信頼性が低い)
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      toJSON(github.event.workflow_run.pull_requests) != '[]'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      PR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      # workflow_run は default branch のファイル内容で起動するため、
      # レビュー対象の差分を読むには PR head SHA を明示的に checkout する。
      #
      # セキュリティ posture (actions/untrusted-checkout 対策):
      # - permissions は contents: read のみ (リポジトリへの書き込み不可)
      # - PR のコード由来のスクリプト (package.json scripts / bun install /
      #   postinstall 等) は**一切実行しない**。本 job では gh CLI と
      #   claude-code-action (SHA ピン留め) のみ実行する
      # - persist-credentials: false で git 認証情報をディスクに残さない
      #   (仮に後続で意図せず untrusted code が実行されても credential 漏洩を防ぐ)
      - name: Checkout PR head (read-only, no script execution)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PR_HEAD_SHA }}
          fetch-depth: 1
          persist-credentials: false

      # 過去のレビュー総評と進捗コメントを OUTDATED として折りたたむ。
      # 新しいレビューが走るたびに積み上がるスクロール負荷を軽減する目的。
      # inline コメントはスレッド resolve で既に折りたたまれるため対象外。
      # 対象:
      #   - 総評 ("## レビュー総評" で始まる body)
      #   - 進捗コメント ("**Claude finished" で始まる body)
      # このステップは Claude review 本体より前に動くため、存在する
      # "Claude finished" は必ず過去 run のもので、当 run のコメントを誤って
      # minimize する心配はない。
      - name: Minimize prior review comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # PR_NUMBER は job レベル env から継承されるが、step 内で明示して可読性を確保
          PR_NUMBER: ${{ env.PR_NUMBER }}
        run: |
          set -euo pipefail
          node_ids=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq '.[] | select(.user.login == "claude[bot]") | select(.body != null and ((.body | startswith("## レビュー総評")) or (.body | startswith("**Claude finished")))) | .node_id')
          if [ -z "$node_ids" ]; then
            echo "No prior review comments to minimize."
            exit 0
          fi
          for id in $node_ids; do
            echo "Minimizing $id"
            # 既に minimize 済みのコメントはエラーになるため握りつぶす
            gh api graphql \
              -f query='mutation($id: ID!) { minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) { minimizedComment { isMinimized } } }' \
              -F id="$id" || echo "  skip (already minimized or failed)"
          done

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@d3a8d1736a61af74bee88bcac0182c49be969839 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          classify_inline_comments: 'false'
          show_full_output: true
          # workflow_run コンテキストでは github.event.pull_request が空のため、
          # action 側が PR を特定できるよう PR 番号と head SHA を明示的に渡す
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model claude-opus-4-6
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment *),Bash(gh pr diff *),Bash(gh pr view *),Read,Glob,Grep"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            この PR のコードレビューを実施してください。CI (lint / typecheck / test:small / test:medium / test:large / lighthouse / build) はすべて成功済みです。

            ## 手順
            1. `gh pr diff ${{ env.PR_NUMBER }}` で差分を確認
            2. 既存の PR コメントを確認し、過去のレビューで指摘済み・resolve 済みの内容を把握する
            3. 変更されたファイルを Read で読み、コンテキストを理解
            4. **新規の問題のみ** inline コメントを投稿 (confirmed: true を必ず指定)。過去のレビューで既に指摘した内容は繰り返さない
            5. 最後に `gh pr comment ${{ env.PR_NUMBER }}` で総評を投稿

            ## コメントプレフィックス
            - blocker: マージをブロックする問題 (修正必須)
            - suggestion: 改善提案 (任意)
            - nit: 些細な指摘 (任意)
            - question: 理解のための質問
            - note: 将来の参考情報

            ## レビュー観点
            1. セキュリティ: 認証・認可、入力バリデーション、秘密情報の露出
            2. 正確性: ロジックの正しさ、エッジケース、エラーハンドリング
            3. Spec との整合性: CLAUDE.md のルールに準拠しているか
            4. パターン一貫性: 既存コードのパターンに従っているか
            5. テスト: 新規コードにテストがあるか

            ## 出力ルール
            - inline コメントは必ず confirmed: true で投稿すること (バッファリング回避)
            - 最後に `gh pr comment` で総評 (LGTM の可否と根拠) を投稿すること。**body は必ず `## レビュー総評` (または `## レビュー総評 (Nth review)`) で始めること** (自動 minimize ワークフローが header で識別するため)
            - メッセージとしてレビュー内容を返さないこと (GitHub コメントのみ)
