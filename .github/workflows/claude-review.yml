name: Claude PR Review

# CI が成功した PR のみをレビュー対象にする。CI 失敗中のコードに
# レビューを走らせても無意味なうえ Opus トークンを浪費するため、
# job の先頭で CI の完走・成功を待ってから review を実行する。
#
# セキュリティ posture:
# - pull_request トリガーは fork PR では secrets を渡さず GITHUB_TOKEN が
#   read-only になるため、pwn request 攻撃経路は成立しない
# - 同一リポ branch からの PR は push 権限を既に持つ信頼済み作業者のみ
# - workflow_run トリガーは default branch の workflow を privileged に
#   実行するため、PR head を checkout すると pwn request パターンを
#   踏む (CodeQL: actions/untrusted-checkout)。本 workflow は採用しない
on:
  pull_request:
    types: [opened, synchronize, reopened]

# 同一 PR への連続 push で古い waiting job を即座にキャンセルする
concurrency:
  group: claude-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # fork PR は secrets にアクセスできず Claude action が早期 fail するため skip
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # Claude の Read / Glob / Grep tool がファイル参照するためのワークツリー。
      # scripts の実行はしない (PR コード由来の package.json / bun install 等は走らせない)。
      # persist-credentials: false で git 認証情報をディスクに残さず、仮に
      # 後続で意図せず untrusted code が実行されても credential 漏洩を防ぐ。
      - name: Checkout PR head (files only, no script execution)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      # CI workflow の成功を待機してからレビュー本体を走らせる。
      # CI が失敗した場合はこの step で exit 1 し、Claude の run を回避する
      # (= Opus トークン節約)。polling 間隔は 30 秒、最大 30 分。
      # gh CLI のみ使用 (新規 action 依存を増やさない)。
      #
      # 初期 race condition: 本 job が CI run の登録より先に起動した場合、
      # workflow_runs が空で jq の last が null を返し status/conclusion が
      # 空文字列になる。case の `*)` 分岐で sleep 30 して retry するため機能
      # 的には問題ない (not_started 相当として polling を継続する)。
      - name: Wait for CI to succeed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 1800))
          while [ $SECONDS -lt $deadline ]; do
            # pull_request イベント由来の最新 CI run を head SHA で検索
            read -r status conclusion <<EOF
          $(gh api "repos/${REPO}/actions/runs?head_sha=${PR_HEAD_SHA}&event=pull_request" \
              --jq '[.workflow_runs[] | select(.name == "CI")] | sort_by(.created_at) | last | "\(.status // "not_started") \(.conclusion // "-")"')
          EOF
            echo "CI status: ${status}/${conclusion}"
            case "${status}/${conclusion}" in
              completed/success)
                echo "CI passed; proceeding to review."
                exit 0
                ;;
              completed/*)
                echo "CI concluded as '${conclusion}'; skipping review."
                exit 1
                ;;
              *)
                sleep 30
                ;;
            esac
          done
          echo "Timed out waiting for CI after 30 minutes."
          exit 1

      # 過去のレビュー総評と進捗コメントを OUTDATED として折りたたむ。
      # 新しいレビューが走るたびに積み上がるスクロール負荷を軽減する目的。
      # inline コメントはスレッド resolve で既に折りたたまれるため対象外。
      # 対象:
      #   - 総評 ("## レビュー総評" で始まる body)
      #   - 進捗コメント ("**Claude finished" で始まる body)
      # このステップは Claude review 本体より前に動くため、存在する
      # "Claude finished" は必ず過去 run のもので、当 run のコメントを誤って
      # minimize する心配はない。
      - name: Minimize prior review comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          node_ids=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq '.[] | select(.user.login == "claude[bot]") | select(.body != null and ((.body | startswith("## レビュー総評")) or (.body | startswith("**Claude finished")))) | .node_id')
          if [ -z "$node_ids" ]; then
            echo "No prior review comments to minimize."
            exit 0
          fi
          for id in $node_ids; do
            echo "Minimizing $id"
            # 既に minimize 済みのコメントはエラーになるため握りつぶす
            gh api graphql \
              -f query='mutation($id: ID!) { minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) { minimizedComment { isMinimized } } }' \
              -F id="$id" || echo "  skip (already minimized or failed)"
          done

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@d3a8d1736a61af74bee88bcac0182c49be969839 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          classify_inline_comments: 'false'
          show_full_output: true
          claude_args: |
            --model claude-opus-4-6
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment *),Bash(gh pr diff *),Bash(gh pr view *),Read,Glob,Grep"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            この PR のコードレビューを実施してください。CI (lint / typecheck / test:small / test:medium / test:large / lighthouse / build) はすべて成功済みです。

            ## 手順
            1. `gh pr diff ${{ github.event.pull_request.number }}` で差分を確認
            2. 既存の PR コメントを確認し、過去のレビューで指摘済み・resolve 済みの内容を把握する
            3. 変更されたファイルを Read で読み、コンテキストを理解
            4. **新規の問題のみ** inline コメントを投稿 (confirmed: true を必ず指定)。過去のレビューで既に指摘した内容は繰り返さない
            5. 最後に `gh pr comment ${{ github.event.pull_request.number }}` で総評を投稿

            ## コメントプレフィックス
            - blocker: マージをブロックする問題 (修正必須)
            - suggestion: 改善提案 (任意)
            - nit: 些細な指摘 (任意)
            - question: 理解のための質問
            - note: 将来の参考情報

            ## レビュー観点
            1. セキュリティ: 認証・認可、入力バリデーション、秘密情報の露出
            2. 正確性: ロジックの正しさ、エッジケース、エラーハンドリング
            3. Spec との整合性: CLAUDE.md のルールに準拠しているか
            4. パターン一貫性: 既存コードのパターンに従っているか
            5. テスト: 新規コードにテストがあるか

            ## 出力ルール
            - inline コメントは必ず confirmed: true で投稿すること (バッファリング回避)
            - 最後に `gh pr comment` で総評 (LGTM の可否と根拠) を投稿すること。**body は必ず `## レビュー総評` (または `## レビュー総評 (Nth review)`) で始めること** (自動 minimize ワークフローが header で識別するため)
            - メッセージとしてレビュー内容を返さないこと (GitHub コメントのみ)
