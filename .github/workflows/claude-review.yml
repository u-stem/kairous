name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@d3a8d1736a61af74bee88bcac0182c49be969839 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-6
            --max-turns 10
          direct_prompt: |
            PR レビューを実施してください。以下のルールに従ってください:

            ## コメントプレフィックス
            - blocker: マージをブロックする問題 (修正必須)
            - suggestion: 改善提案 (任意)
            - nit: 些細な指摘 (任意)
            - question: 理解のための質問
            - note: 将来の参考情報

            ## レビュー観点
            1. セキュリティ: 認証・認可、入力バリデーション、秘密情報の露出
            2. 正確性: ロジックの正しさ、エッジケース、エラーハンドリング
            3. Spec との整合性: CLAUDE.md のルールに準拠しているか
            4. パターン一貫性: 既存コードのパターンに従っているか
            5. テスト: 新規コードにテストがあるか

            ## 出力
            - 各ファイルの差分に対して inline コメント
            - 最後に総評 (LGTM の可否と根拠)
